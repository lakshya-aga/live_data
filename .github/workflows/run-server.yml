name: Run data server

# Manually dispatch this workflow to spin up the server container.
# Useful for:
#   • Smoke-testing a just-built image end-to-end
#   • Running strategies from a self-hosted runner that has network access
#
# On a hosted GitHub runner the server is reachable only from within the same
# job (localhost:8765).  For persistent deployment see docker-compose.yml.
#
# For a self-hosted runner on your VPS/workstation, strategies on the same host
# can connect to the published port after the "Run server" step starts.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to run (default: main)"
        default: "main"
        required: false
      duration:
        description: "Seconds to keep the server alive (max ~300 on hosted runners)"
        default: "120"
        required: false
      log_level:
        description: "Log verbosity"
        default: "INFO"
        required: false
        type: choice
        options: [DEBUG, INFO, WARNING]

env:
  IMAGE: ghcr.io/lakshya-aga/live-data

jobs:
  run-server:
    runs-on: ubuntu-latest   # replace with your self-hosted runner label for persistence
    permissions:
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: docker pull ${{ env.IMAGE }}:${{ inputs.image_tag }}

      - name: Start server in background
        run: |
          docker run --rm --name live-data \
            -p 8765:8765 \
            -e LOG_LEVEL=${{ inputs.log_level }} \
            -e LOG_FORMAT=console \
            -e GROWW_API_KEY=${{ secrets.GROWW_API_KEY }} \
            -e GROWW_API_SECRET=${{ secrets.GROWW_API_SECRET }} \
            -e SCREENER_API_KEY=${{ secrets.SCREENER_API_KEY }} \
            ${{ env.IMAGE }}:${{ inputs.image_tag }} &

          echo "Waiting for server to be ready..."
          timeout 30 bash -c 'until python3 -c "import socket; socket.create_connection((\"localhost\",8765),1)" 2>/dev/null; do sleep 1; done'
          echo "Server is up on ws://localhost:8765"

      - name: Smoke test — verify WebSocket handshake
        run: |
          python3 - <<'EOF'
          import asyncio, json

          async def smoke():
              import websockets
              async with websockets.connect("ws://localhost:8765") as ws:
                  hello = json.loads(await ws.recv())
                  assert hello["type"] == "info", f"unexpected: {hello}"
                  await ws.send(json.dumps({"action": "ping", "channels": [], "symbols": []}))
                  # drain until we get pong (ack may arrive first)
                  for _ in range(5):
                      msg = json.loads(await ws.recv())
                      if msg["type"] == "pong":
                          print("Smoke test passed — got pong")
                          return
                  raise AssertionError("no pong received")

          asyncio.run(smoke())
          EOF
          pip install websockets --quiet

          python3 - <<'EOF'
          import asyncio, json, websockets

          async def smoke():
              async with websockets.connect("ws://localhost:8765") as ws:
                  hello = json.loads(await ws.recv())
                  assert hello["type"] == "info", f"unexpected: {hello}"
                  await ws.send(json.dumps({"action": "ping", "channels": [], "symbols": []}))
                  for _ in range(5):
                      msg = json.loads(await ws.recv())
                      if msg["type"] == "pong":
                          print("Smoke test passed — got pong")
                          return
                  raise AssertionError("no pong received")

          asyncio.run(smoke())
          EOF

      - name: Keep server alive for ${{ inputs.duration }}s
        run: sleep ${{ inputs.duration }}

      - name: Show server logs
        if: always()
        run: docker logs live-data 2>&1 || true

      - name: Stop server
        if: always()
        run: docker stop live-data 2>/dev/null || true
