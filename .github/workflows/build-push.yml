name: Build & push Docker image

# Triggers on every push to any branch and on version tags.
# Every push produces a pushed image — check the Packages tab to see it.
#
# Tags produced:
#   push to any branch  →  :<branch-name>  :sha-<short>
#   version tag v1.2.3  →  :1.2.3  :1.2  :latest  :sha-<short>
on:
  push:
    branches: ["**"]
    tags: ["v*"]

env:
  IMAGE: ghcr.io/lakshya-aga/live-data

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # branch push  →  :main  :feature-foo  etc.
            type=ref,event=branch
            # semver tag   →  :1.2.3  :1.2  :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # always add short SHA so every push is individually addressable
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
